<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBridge AI</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .phone {
            position: relative;
            background: #f8fafc;
            border-radius: 50px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 8px solid #0f172a;
            display: flex;
            flex-direction: column;
            height: min(844px, calc(100dvh - 32px));
            width: min(390px, calc((100dvh - 32px) * 390 / 844));
        }

        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            pointer-events: none;
        }

        .status-time {
            font-size: 14px;
            font-weight: 600;
            margin-top: 4px;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #000;
            border-radius: 0 0 20px 20px;
        }

        .screen {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-top: 48px;
            background: #f8fafc;
        }

        .screen::-webkit-scrollbar {
            display: none;
        }

        .screen {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .bottom-nav {
            flex-shrink: 0;
            height: 72px;
            background: #fff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px 12px;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 48px;
            gap: 4px;
            border-radius: 12px;
            border: none;
            background: none;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.15s;
        }

        .nav-btn.active {
            color: #0d9488;
        }

        .nav-btn span {
            font-size: 10px;
            font-weight: 500;
        }

        .nav-btn.active span {
            font-weight: 700;
        }

        @keyframes scanline {
            0% {
                top: 0
            }

            100% {
                top: calc(100% - 2px)
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes ping {
            0% {
                transform: scale(1);
                opacity: 1
            }

            75%,
            100% {
                transform: scale(2);
                opacity: 0
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        .scanline {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2dd4bf, transparent);
            box-shadow: 0 0 8px 2px rgba(45, 212, 191, .5);
            animation: scanline 2s linear infinite;
        }

        .scanline-violet {
            background: linear-gradient(90deg, transparent, #a78bfa, transparent);
            box-shadow: 0 0 8px 2px rgba(167, 139, 250, .5);
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        .ping-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .4);
            animation: ping 1.5s cubic-bezier(0, 0, .2, 1) infinite;
        }

        button {
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.97);
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

        function chatMsg(m, i) {
            var isLast = i === S.msgs.length - 1;
            if (m.role === 'user') return '<div style="display:flex;justify-content:flex-end;"><div style="background:#0d9488;color:white;padding:10px 16px;border-radius:16px 16px 4px 16px;font-size:13px;max-width:80%;line-height:1.5;">' + m.text + '</div></div>';
